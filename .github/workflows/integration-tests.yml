name: Integration Tests

on:
  pull_request:
    branches: [ develop, main ]

jobs:
  integration-tests:
    name: API Integration Tests
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:14
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_USER: postgres
          POSTGRES_DB: Vanguard_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    
    steps:
      - uses: actions/checkout@v3
      
      - name: Setup .NET
        uses: actions/setup-dotnet@v3
        with:
          dotnet-version: 9.0.x
          
      - name: Restore dependencies
        run: dotnet restore
        
      - name: Build
        run: dotnet build --no-restore --configuration Debug
        
      - name: Run Integration Tests
        run: dotnet test --no-build --filter Category=Integration
        env:
          ConnectionStrings__DefaultConnection: "Host=localhost;Database=Vanguard_test;Username=postgres;Password=postgres"
        
      - name: Upload test results
        uses: actions/upload-artifact@v3
        with:
          name: integration-test-results
          path: TestResults/
        if: always()

  e2e-tests:
    name: End-to-End Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 18
          
      - name: Install dependencies
        run: cd src/Vanguard.Angular && npm ci
        
      - name: Cypress run
        uses: cypress-io/github-action@v5
        with:
          working-directory: src/Vanguard.Angular
          build: npm run build
          start: npm run start:ci
          wait-on: 'http://localhost:4200'