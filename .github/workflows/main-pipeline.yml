# .github/workflows/main-pipeline.yml
name: Main Pipeline (Production)

on:
  push:
    branches: [ main ]

jobs:
  build-and-test:
    name: Build and Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 9.0.x
          
      - name: Setup Node.js
        uses: actions/setup-node@v4 
        with:
          node-version: 18
          
      - name: Backend - Restore dependencies
        run: dotnet restore
        
      - name: Backend - Build
        run: dotnet build --no-restore --configuration Release
        
      - name: Backend - Test
        run: dotnet test --no-build --filter "Category=Unit|Category=Integration" --configuration Release
        
      - name: Frontend - Install dependencies
        run: cd src/Vanguard.Angular && npm ci
        
      - name: Frontend - Lint
        run: cd src/Vanguard.Angular && npm run lint
        
      - name: Frontend - Test
        run: cd src/Vanguard.Angular && npm run test
        
      - name: Frontend - Build
        run: cd src/Vanguard.Angular && npm run build:production
        
      - name: Create build artifacts
        run: |
          mkdir -p artifacts/api
          mkdir -p artifacts/Angular
          dotnet publish src/Vanguard.Api -c Release -o artifacts/api
          cp -r src/Vanguard.Angular/dist/Vanguard-Angular/* artifacts/Angular/ || cp -r src/Vanguard.Angular/dist/* artifacts/Angular/
      
      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-artifacts
          path: artifacts/
          retention-days: 1

  create-release:
    name: Create Release
    needs: build-and-test
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.tag_version.outputs.new_tag }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          
      - name: Generate changelog
        id: changelog
        uses: metcalfc/changelog-generator@v4.0.1
        with:
          myToken: ${{ secrets.GITHUB_TOKEN }}
          
      - name: Create version tag
        id: tag_version
        uses: mathieudutour/github-tag-action@v6.1
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          
      - name: Create GitHub Release
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ steps.tag_version.outputs.new_tag }}
          release_name: Release ${{ steps.tag_version.outputs.new_tag }}
          body: ${{ steps.changelog.outputs.changelog }}

  deploy-backend-production:
    name: Deploy Backend to Production
    needs: [build-and-test, create-release]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      
      - name: Download build artifacts
        uses: actions/download-artifact@v3
        with:
          name: build-artifacts
          path: artifacts/
      
      - name: Display structure of downloaded files
        run: ls -R artifacts/
      
      - name: Deploy to Heroku (Production)
        uses: akhileshns/heroku-deploy@v3.12.13
        with:
          heroku_api_key: ${{ secrets.HEROKU_API_KEY }}
          heroku_app_name: "vanguard-api-prod"
          heroku_email: ${{ secrets.HEROKU_EMAIL }}
          appdir: "artifacts/api"
          
      - name: Run database migrations
        run: |
          heroku run --app vanguard-api-prod "dotnet Vanguard.Api.dll -- migrate" || echo "Migration failed"

  deploy-frontend-production:
    name: Deploy Frontend to Production
    needs: [build-and-test, create-release]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      
      - name: Download build artifacts
        uses: actions/download-artifact@v3
        with:
          name: build-artifacts
          path: artifacts/
      
      - name: Display structure of downloaded files
        run: ls -R artifacts/
          
      - name: Deploy to GitHub Pages (Production)
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: artifacts/Angular
          branch: gh-pages
          target-folder: production