# .github/workflows/develop-pipeline.yml
name: Develop CI/CD

on:
  push:
    branches: [develop]
  workflow_dispatch: # Allow manual triggering

jobs:
  build-and-test:
    name: Build and Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4.2.2

      - name: Setup .NET
        uses: actions/setup-dotnet@v4.3.0
        with:
          dotnet-version: 9.0.x

      - name: Setup Node.js
        uses: actions/setup-node@v4.2.0
        with:
          node-version: 18

      - name: Backend - Restore dependencies
        run: dotnet restore

      - name: Backend - Build
        run: dotnet build --no-restore --configuration Debug

      - name: Backend - Unit Test with coverage
        run: dotnet test --configuration Debug /p:CollectCoverage=true /p:CoverletOutputFormat=cobertura /p:CoverletOutput=./TestResults/Coverage/

      - name: Generate backend coverage report
        uses: danielpalme/ReportGenerator-GitHub-Action@5.2.0
        with:
          reports: "**/coverage.cobertura.xml"
          targetdir: "coveragereport"
          reporttypes: "HtmlInline_AzurePipelines;Cobertura;Badges"

      - name: Upload backend coverage report
        uses: actions/upload-artifact@v4.6.1
        with:
          name: backend-coverage-report
          path: coveragereport/
          retention-days: 7

      - name: Create required directories for Angular
        run: mkdir -p src/Vanguard.Angular/obj/Debug

      - name: Frontend - Install dependencies
        run: cd src/Vanguard.Angular && npm ci

      - name: Frontend - Lint
        run: cd src/Vanguard.Angular && npm run lint

      - name: Frontend - Test
        run: |
          cd src/Vanguard.Angular
          npx ng test --watch=false --browsers=ChromeHeadless --code-coverage

      - name: Backend - Publish
        run: dotnet publish src/Vanguard.Api/Vanguard.Api.csproj -c Debug -o publish

      - name: Upload API build artifacts
        uses: actions/upload-artifact@v4.6.1
        with:
          name: api-build
          path: publish/
          retention-days: 1

      - name: Frontend - Build
        run: cd src/Vanguard.Angular && npm run build:dev

      - name: Upload frontend build artifacts
        uses: actions/upload-artifact@v4.6.1
        with:
          name: frontend-build
          path: src/Vanguard.Angular/dist/vanguard-web/browser/
          retention-days: 1

      - name: Create coverage summary
        run: |
          echo "# Coverage Report" > $GITHUB_STEP_SUMMARY
          echo "## Backend Coverage" >> $GITHUB_STEP_SUMMARY
          cat coveragereport/Summary.md >> $GITHUB_STEP_SUMMARY
          echo "## Frontend Coverage" >> $GITHUB_STEP_SUMMARY
          cat src/Vanguard.Angular/coverage/coverage-summary.txt >> $GITHUB_STEP_SUMMARY || echo "No frontend coverage summary available" >> $GITHUB_STEP_SUMMARY
